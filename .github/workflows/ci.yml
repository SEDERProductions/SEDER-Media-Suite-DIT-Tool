name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  QT_VERSION: "6.4.2"

jobs:
  rust:
    name: Rust core
    # Standard GitHub-hosted runners are free for public repositories.
    # Do not switch this project to paid larger runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt -- --check
      - name: Lint
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Check
        run: cargo check --manifest-path Cargo.toml --locked
      - name: Test
        run: cargo test --manifest-path Cargo.toml --locked


  release-naming:
    name: Release asset naming guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate expected release asset names
        env:
          VERSION: v0.0.0
        run: scripts/release-artifacts.sh --list > /tmp/release-assets.generated
      - name: Validate README references generated naming rules
        run: grep -q 'scripts/release-artifacts.sh --list' README.md
      - name: Validate release workflow uses generated naming rules
        run: grep -q 'scripts/release-artifacts.sh --list' .github/workflows/release.yml

  qt:
    name: Qt build and tests (${{ matrix.name }})
    # These are standard public-repo runner labels. Public repositories get
    # free standard-runner usage; private repositories/forks may be billed.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            generator: Ninja
            configure_extra: -DCMAKE_BUILD_TYPE=Release
          - name: windows
            os: windows-latest
            generator: Visual Studio 17 2022
            configure_extra: -A x64
          - name: macos-arm64
            os: macos-latest
            generator: Ninja
            configure_extra: -DCMAKE_BUILD_TYPE=Release

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            imagemagick \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            ninja-build

      - name: Install macOS build packages
        if: runner.os == 'macOS'
        run: |
          brew install ninja
          brew install imagemagick

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Configure
        shell: bash
        run: |
          cmake -S qt -B qt/build \
            -G "${{ matrix.generator }}" \
            ${{ matrix.configure_extra }} \
            -DBUILD_TESTING=ON

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          cmake --build qt/build --config Release --verbose 2>&1 | tee qt/build/build.log

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qt-build-log-${{ matrix.name }}
          path: qt/build/build.log
          if-no-files-found: warn

      - name: Test
        run: ctest --test-dir qt/build --output-on-failure -C Release
