name: Auto Tag on Push

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: bump version to')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag and bump patch
        id: bump
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST → New tag: $NEW_TAG"

      - name: Update Cargo.toml version
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          NEW_VERSION="${NEW_TAG#v}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$NEW_VERSION\"/" Cargo.toml
          cat Cargo.toml | grep "^version"

      - name: Commit version bump and push tag
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${NEW_TAG}"
          git tag "$NEW_TAG"
          git push origin HEAD:main
          git push origin "$NEW_TAG"
