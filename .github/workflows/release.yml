name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

env:
  QT_VERSION: "6.7.3"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    # Use only standard GitHub-hosted runners. They are free for public
    # repositories; avoid paid larger runners, GPU runners, and self-hosted
    # infrastructure for this open-source release pipeline.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: linux-x64
            os: ubuntu-latest
            package_command: bash scripts/package-linux.sh
            shell: bash
          - artifact_name: windows-x64
            os: windows-latest
            package_command: ./scripts/package-windows.ps1
            shell: pwsh
          - artifact_name: macos-arm64
            os: macos-latest
            package_command: bash scripts/package-macos.sh
            shell: bash
          - artifact_name: macos-x64
            os: macos-15-intel
            package_command: bash scripts/package-macos.sh
            shell: bash

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            ninja-build

      - name: Install macOS build packages
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Download linuxdeployqt for AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -L \
            -o "$RUNNER_TEMP/linuxdeployqt.AppImage" \
            "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
          chmod +x "$RUNNER_TEMP/linuxdeployqt.AppImage"
          echo "LINUXDEPLOYQT=$RUNNER_TEMP/linuxdeployqt.AppImage" >> "$GITHUB_ENV"
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Package
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          CMAKE_GENERATOR: ${{ runner.os == 'Windows' && 'Visual Studio 17 2022' || 'Ninja' }}
          CMAKE_GENERATOR_PLATFORM: ${{ runner.os == 'Windows' && 'x64' || '' }}
        run: ${{ matrix.package_command }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          CMAKE_GENERATOR: Visual Studio 17 2022
          CMAKE_GENERATOR_PLATFORM: x64
        run: ${{ matrix.package_command }}

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/artifacts/*
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums and release notes
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cd ..
          cat > RELEASE_NOTES.md <<EOF
          # SEDER DIT Tool ${RELEASE_TAG}

          Unsigned cross-platform build generated by GitHub Actions from tag \`${RELEASE_TAG}\`.

          ## Downloads

          - macOS Apple Silicon: \`seder-dit-tool-${RELEASE_TAG}-macos-arm64-unsigned.zip\`
          - macOS Intel: \`seder-dit-tool-${RELEASE_TAG}-macos-x64-unsigned.zip\`
          - Windows x64: \`seder-dit-tool-${RELEASE_TAG}-windows-x64.zip\`
          - Linux x64: \`seder-dit-tool-${RELEASE_TAG}-linux-x64.AppImage\`
          - Linux fallback: \`seder-dit-tool-${RELEASE_TAG}-linux-x64.tar.gz\`

          Verify downloads with \`SHA256SUMS.txt\` before launching.

          ## Unsigned Build Notice

          These binaries are unsigned. macOS and Windows may show extra launch warnings. This release does not require Apple Developer ID, notarization, Windows signing certificates, paid larger runners, or external release infrastructure.

          ## Local Processing

          Folder comparison, checksums, and report export run locally on your machine.
          EOF

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --draft=true \
              --title "SEDER DIT Tool ${RELEASE_TAG}" \
              --notes-file RELEASE_NOTES.md
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --draft \
              --target "$GITHUB_SHA" \
              --title "SEDER DIT Tool ${RELEASE_TAG}" \
              --notes-file RELEASE_NOTES.md
          fi
